<style>
  :host {
    --bright-blue: oklch(51.01% 0.274 263.83);
    --electric-violet: oklch(53.18% 0.28 296.97);
    --french-violet: oklch(47.66% 0.246 305.88);
    --vivid-pink: oklch(69.02% 0.277 332.77);
    --hot-red: oklch(61.42% 0.238 15.34);
    --orange-red: oklch(63.32% 0.24 31.68);

    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);

    --red-to-pink-to-purple-vertical-gradient: linear-gradient(180deg,
        var(--orange-red) 0%,
        var(--vivid-pink) 50%,
        var(--electric-violet) 100%);

    --red-to-pink-to-purple-horizontal-gradient: linear-gradient(90deg,
        var(--orange-red) 0%,
        var(--vivid-pink) 50%,
        var(--electric-violet) 100%);

    --pill-accent: var(--bright-blue);

    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1 {
    font-size: 3.125rem;
    color: var(--gray-900);
    font-weight: 500;
    line-height: 100%;
    letter-spacing: -0.125rem;
    margin: 0;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
  }



  main {
    width: 100%;
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
    box-sizing: inherit;
    position: relative;
  }

  .angular-logo {
    max-width: 9.2rem;
  }

  .errMsg {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background-color: #f8d7da;
  color: #721c24;
  padding: 10px 20px;
  border: 1px solid #f5c6cb;
  border-radius: 5px;
  font-size: 14px;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
  z-index: 1000;
  text-align: center;
  animation: fadeOut 7s forwards; /* Apply fade-out animation */
}

@keyframes fadeOut {
  0% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    opacity: 0;
  }
}



  .content {
    display: flex;
    justify-content: space-around;
    width: 100%;
    max-width: 700px;
    margin-bottom: 3rem;
    margin-top: 5.5rem;
  }

  .content h1 {
    margin-top: 1.75rem;
  }

  .content p {
    margin-top: 1.5rem;
  }

  .divider {
    width: 1px;
    background: var(--red-to-pink-to-purple-vertical-gradient);
    margin-inline: 0.5rem;
  }


  .ggl{
    margin-top: 1px;
    position: fixed;
    margin-left: 16px;
  }

  @media screen and (max-width: 650px) {
    .content {
      flex-direction: column;
      width: max-content;
    }

    .divider {
      height: 1px;
      width: 100%;
      background: var(--red-to-pink-to-purple-horizontal-gradient);
      margin-block: 1.5rem;
    }
  }
</style>

<main class="main">
  <!-- Display the error message if it exists -->
  <div *ngIf="errorMessage" class = "errMsg">
    <code>{{ errorMessage }}</code>
  </div>
  <div class="content">
    <div class="left-side">
      <h1>{{ title }}</h1>
      <p>Let's get started 🎉</p>
    </div>
    <div class="divider" role="separator" aria-label="Divider"></div>
    <div class="right-side">
      <div class="pill-group">

        <div class="login-container">
          <form [formGroup]="loginForm" (ngSubmit)="login()">
            <div>
              <label for="email">Email</label>
              <input id="email" formControlName="email" type="email" required />
            </div>
            <div>
              <label for="password">Password</label>
              <input id="password" formControlName="password" type="password" required />
            </div>
            <div>
              <button type="submit" [disabled]="loginForm.invalid">Login</button>
            </div>
          </form>
          <div>or</div>
          <button (click)="loginWithGoogle()">Sign in with

            <svg class = "ggl" width="15" height="15" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335"
                d="M24 9.5c3.54 0 6.68 1.22 9.15 3.63l6.88-6.88C36.45 2.54 30.6 0 24 0 14.68 0 6.56 5.62 2.46 13.91l7.93 6.15C12.28 12.63 17.71 9.5 24 9.5z" />
              <path fill="#4285F4"
                d="M46.47 24.52c0-1.62-.15-3.18-.42-4.69H24v9.07h12.6c-.54 2.79-2.12 5.15-4.47 6.77l7.05 5.48C43.43 36.67 46.47 31.08 46.47 24.52z" />
              <path fill="#FBBC05"
                d="M10.39 28.48c-1.36-2.57-2.14-5.49-2.14-8.48s.78-5.91 2.14-8.48l-7.93-6.15C1.14 9.4 0 13.57 0 18c0 4.43 1.14 8.6 3.09 12.15l7.3-5.67z" />
              <path fill="#34A853"
                d="M24 48c6.48 0 11.91-2.15 15.88-5.85l-7.05-5.48C30.78 38.68 27.55 39.5 24 39.5c-6.29 0-11.72-3.13-14.64-7.92l-7.3 5.67C6.56 42.38 14.68 48 24 48z" />
              <path fill="none" d="M0 0h48v48H0z" />
            </svg>

          </button>
        </div>

      </div>

    </div>
  </div>
</main>
